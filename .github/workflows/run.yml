name: 每日自动抓取新西兰UI岗位
on:
  #schedule:
  #  - cron: "0 2 * * *"  # 每天北京时间10点 = 新西兰时间15点
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install requests beautifulsoup4 pandas
      - run: python job_bot.py
