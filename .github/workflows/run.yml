name: 测试浏览器抓取
on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Chrome
        uses: browser-actions/setup-chrome@latest
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install selenium pandas
      - run: python job_bot.py
